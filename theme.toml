# theme.toml template for a Hugo theme
# See https://github.com/spf13/hugoThemes#themetoml for an example

name = "Hestia Clear"
license = "MIT"
licenselink = "https://github.com/diwao/hestia-clear/blob/main/LICENSE.md"
description = "A clean, minimal Hugo blog theme built with Tailwind CSS and Hugo Pipes."
homepage = "https://github.com/diwao/hestia-clear"
tags = ["blog", "tailwind", "minimal", "responsive"]
features = ["Tailwind CSS", "Responsive Design", "Syntax Highlighting"]
min_version = "0.109.0"

[author]
  name = "diwao"
  homepage = "http://diwao.com/"

# If porting an existing theme
[original]
  name = ""
  homepage = ""
  repo = ""
