<!DOCTYPE html>
<html lang="{{ .Language.Locale | default .Language.Lang }}">
  {{ partial "head" . }}
  <body>
    <div id="wrap" class="wrap">
      {{ partial "header" . }}
      <main class="main">
        <h2>404 Page not found.</h2>
        <p>
          The page you are looking for could not be found. The URL you entered
          may be incorrect or the page may have been deleted.
        </p>
        <p>
          Please check the URL and try reloading, or return to the
          <a href="{{ .Site.Home.RelPermalink }}">top page</a>.
        </p>
      </main>
    </div>
    {{ partial "js" . }}
  </body>
</html>
