<header class="header">
  {{ $isHomePage := eq .Title .Site.Title }}
  {{ if $isHomePage }}
  <h1 class="site-title"><a href="{{ "/" | relURL }}">{{ .Site.Title }}</a></h1>
  {{ else }}
  <div class="site-title"><a href="{{ "/" | relURL }}">{{ .Site.Title }}</a></div>
  {{ end }}
  <p class="site-desc">{{ .Site.Params.description }}</p>
  {{ if .Site.Params.googlecustomsearch }}
  <div class="search">
    <gcse:searchbox-only></gcse:searchbox-only>
  </div>
  {{ end }}
</header>
